<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Financeiro - Dindingo</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header class="header">
    <h1 id="nome">Dindingo</h1>
    <div class="mes-controle">
        <button class="btn-mes" id="mesAnterior">◀</button>
        <span id="mesAtual">Carregando...</span>
        <button class="btn-mes" id="proximoMes">▶</button>
    </div>
</header>

<main class="container">

    <div id="dashboard-message" style="text-align: center; margin-bottom: 15px; font-weight: bold;"></div>

    <section class="cards">
        <div class="card receita">
            <h2>Total de Receita</h2>
            <p id="receita">R$ 0,00</p>
        </div>

        <div class="card despesa">
            <h2>Total de Despesas</h2>
            <p id="despesa">R$ 0,00</p>
        </div>

        <div class="card saldo">
            <h2>Saldo</h2>
            <p id="saldo">R$ 0,00</p>
        </div>
    </section>

    <section class="acoes">
        <button class="btn adicionar-receita" id="btn-nova-receita">+ Adicionar Receita</button>
        <button class="btn adicionar-despesa" id="btn-nova-despesa">+ Adicionar Despesa</button>
    </section>

    <section class="lista-despesas">
        <h2>Lançamentos do Mês</h2>

        <div class="tabela-wrapper">
            <table class="tabela-despesas">
                <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="tabela-lancamentos-body">
                </tbody>
            </table>
        </div>
    </section>
</main>

<div id="modal-lancamento" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-titulo">Adicionar Lançamento</h2>
            <span class="close" id="btn-fechar-modal">&times;</span>
        </div>
        <form id="form-lancamento">
            <input type="hidden" id="lancamento-tipo" value="receita">

            <div class="form-group">
                <label for="lancamento-nome">Nome / Título</label>
                <input type="text" id="lancamento-nome" required maxlength="50">
            </div>

            <div class="form-group">
                <label for="lancamento-valor">Valor (R$)</label>
                <input type="number" id="lancamento-valor" step="0.01" min="0.01" required>
            </div>

            <div class="form-group">
                <label for="lancamento-data">Data</label>
                <input type="date" id="lancamento-data" required>
            </div>

            <div class="form-group">
                <label for="lancamento-categoria">Categoria</label>
                <input type="text" id="lancamento-categoria" placeholder="Ex: Salário, Alimentação">
            </div>

            <button type="submit" class="btn-salvar">Salvar Lançamento</button>
        </form>
    </div>
</div>

<script src="/js/api/api.js"></script>
<script src="/js/dashboard/dashboard.js"></script>
</body>

</html>
