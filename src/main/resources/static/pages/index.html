<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Financeiro - Dindingo</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header class="header">
    <h1 id="nome">Dindingo</h1>
    <div class="mes-controle">
        <button class="btn-mes" id="mesAnterior">◀</button>
        <span id="mesAtual">Carregando...</span>
        <button class="btn-mes" id="proximoMes">▶</button>
    </div>
</header>

<main class="container">

    <div id="dashboard-message" style="text-align: center; margin-bottom: 15px; font-weight: bold;"></div>

    <section class="cards">
        <div class="card receita">
            <h2>Total de Receita</h2>
            <p id="receita">R$ 0,00</p>
        </div>

        <div class="card despesa">
            <h2>Total de Despesas</h2>
            <p id="despesa">R$ 0,00</p>
        </div>

        <div class="card saldo">
            <h2>Saldo</h2>
            <p id="saldo">R$ 0,00</p>
        </div>
    </section>

    <section class="acoes">
        <button class="btn adicionar-receita" id="btn-nova-receita">+ Adicionar Receita</button>
        <button class="btn adicionar-despesa" id="btn-nova-despesa">+ Adicionar Despesa</button>
    </section>

    <section class="lista-despesas">
        <div class="container-cabecalho-lancamentos">
            <h2 class="titulo-esquerda">Lançamentos do Mês</h2>
            <div>
                <button class="btn btn-pequeno exportar-relatorio" id="btn-abrir-boletos" style="background-color: var(--cor-botao-azul);">🎫 Boletos</button>
                <button class="btn btn-pequeno exportar-relatorio" id="btn-exportar-relatorio">📄 Exportar Relatório</button>
            </div>
        </div>

        <div class="tabela-wrapper">
            <table class="tabela-despesas">
                <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="tabela-lancamentos-body">
                </tbody>
            </table>
        </div>
    </section>
</main>

<div id="modal-lancamento" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-titulo">Adicionar Lançamento</h2>
            <span class="close" id="btn-fechar-modal">&times;</span>
        </div>
        <form id="form-lancamento">
            <input type="hidden" id="lancamento-tipo" value="receita">

            <div class="form-group">
                <label for="lancamento-nome">Nome / Título</label>
                <input type="text" id="lancamento-nome" required maxlength="50">
            </div>

            <div class="form-group">
                <label for="lancamento-valor">Valor (R$)</label>
                <input type="number" id="lancamento-valor" step="0.01" min="0.01" required>
            </div>

            <div class="form-group">
                <label for="lancamento-data">Data</label>
                <input type="date" id="lancamento-data" required>
            </div>

            <div class="form-group">
                <label for="lancamento-categoria">Categoria</label>
                <input type="text" id="lancamento-categoria" placeholder="Ex: Salário, Alimentação">
            </div>

            <div class="form-group">
                <label for="lancamento-descricao">Descrição</label>
                <input type="text" id="lancamento-descricao">
            </div>

            <div class="form-group">
                <fieldset>
                    <label for="lancamento-recorrencia">Lançamento recorrente - </label>
                    <input type="checkbox" id="lancamento-recorrencia">
                </fieldset>
            </div>

            <button type="submit" class="btn-salvar">Salvar Lançamento</button>
        </form>
    </div>
</div>

<div id="modal-boletos" class="modal">
    <div class="modal-content" style="max-width: 700px;"> <div class="modal-header">
        <h2>Boletos</h2>
        <span class="close" id="btn-fechar-boletos">&times;</span>
    </div>

        <button class="btn adicionar-receita" id="btn-novo-boleto" style="margin-bottom: 20px; min-width: auto; width: auto; padding: 10px 15px;">+ Adicionar Boleto</button>

        <div class="tabela-wrapper" style="max-height: 250px;">
            <table class="tabela-despesas" style="table-layout: auto;">
                <thead>
                <tr>
                    <th>Título</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="tabela-boletos-body">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-form-boleto" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-boleto-titulo">Cadastrar Boleto</h2>
            <span class="close" id="btn-fechar-form-boleto">&times;</span>
        </div>
        <form id="form-boleto">
            <input type="hidden" id="boleto-id">

            <div class="form-group">
                <label for="boleto-titulo">Título / Descrição</label>
                <input type="text" id="boleto-titulo" required>
            </div>

            <div class="form-group">
                <label for="boleto-valor">Valor (R$)</label>
                <input type="number" id="boleto-valor" step="0.01" min="0.01" required>
            </div>

            <div class="form-group">
                <label for="boleto-vencimento">Data de Vencimento</label>
                <input type="date" id="boleto-vencimento" required>
            </div>

            <div class="form-group">
                <label for="boleto-codigo">Código de Barras (Opcional)</label>
                <input type="text" id="boleto-codigo">
            </div>

            <button type="submit" class="btn-salvar" id="btn-salvar-boleto">Salvar Boleto</button>
        </form>
    </div>
</div>

<script src="../js/api/api.js"></script>
<script type="module" src="../js/dashboard/dashboard.js"></script>
</body>

</html>
